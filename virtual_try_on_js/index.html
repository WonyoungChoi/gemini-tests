<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini Virtual Try-On (Nano Banana)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Gemini Virtual Try-On</h1>
      <span class="subtitle">
        인물 + 의상 → 착용 이미지 N장 생성 (Nano Banana / gemini-2.5-flash-image)
      </span>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel">
          <h2>API Key</h2>
          <label class="field">
            <span>GEMINI_API_KEY</span>
            <input
              id="apiKey"
              type="password"
              autocomplete="off"
              placeholder="AIza..."
            />
          </label>
          <label class="checkbox">
            <input id="rememberKey" type="checkbox" />
            <span>이 브라우저에 저장 (localStorage)</span>
          </label>
        </section>

        <section class="panel">
          <h2>모델 선택</h2>
          <label class="field">
            <span>Model</span>
            <select id="model">
              <option value="gemini-2.5-flash-image" selected>
                gemini-2.5-flash-image (Nano Banana)
              </option>
              <option value="gemini-2.5-flash-image-preview">
                gemini-2.5-flash-image-preview
              </option>
            </select>
          </label>
          <button id="listModelsBtn" type="button" class="secondary">
            사용 가능한 모델 불러오기
          </button>
        </section>

        <section class="panel">
          <h2>생성 옵션</h2>
          <label class="field">
            <span>Sample count (1–4)</span>
            <select id="sampleCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
            </select>
            <span class="hint">병렬로 N번 호출합니다 (각 호출당 1장).</span>
          </label>

          <label class="field">
            <span>Image size</span>
            <select id="imageSize">
              <option value="">(모델 기본값)</option>
              <option value="1K">1K</option>
              <option value="2K">2K</option>
              <option value="4K">4K</option>
            </select>
          </label>

          <label class="field">
            <span>Temperature (선택)</span>
            <input
              id="temperature"
              type="number"
              step="0.05"
              min="0"
              max="2"
              placeholder="(모델 기본값)"
            />
            <span class="hint">값이 클수록 샘플 간 다양성↑.</span>
          </label>

          <label class="field">
            <span>Seed (선택)</span>
            <input id="seed" type="number" placeholder="비워두면 랜덤" />
            <span class="hint">
              지정 시 동일 prompt+이미지에서 같은 결과가 나옵니다.
              N장 다양성을 위해 비워두는 것을 권장.
            </span>
          </label>
        </section>

        <section class="panel">
          <h2>옵션</h2>
          <label class="checkbox">
            <input id="verbose" type="checkbox" checked />
            <span>Verbose 로그</span>
          </label>
          <button id="clearLogBtn" type="button" class="secondary">
            로그 지우기
          </button>
        </section>
      </aside>

      <section class="content">
        <form id="tryOnForm" class="panel form">
          <h2>입력</h2>
          <div class="input-grid">
            <label class="field">
              <span>인물 이미지</span>
              <input id="personFile" type="file" accept="image/*" required />
            </label>
            <label class="field">
              <span>의상 이미지</span>
              <input id="productFile" type="file" accept="image/*" required />
            </label>
          </div>

          <div class="image-grid two">
            <figure class="image-card">
              <figcaption>
                <strong>인물</strong>
                <span id="personInfo" class="meta"></span>
              </figcaption>
              <div class="image-wrap" id="personWrap">
                <p class="placeholder">파일을 선택하면 표시됩니다.</p>
              </div>
            </figure>
            <figure class="image-card">
              <figcaption>
                <strong>의상</strong>
                <span id="productInfo" class="meta"></span>
              </figcaption>
              <div class="image-wrap" id="productWrap">
                <p class="placeholder">파일을 선택하면 표시됩니다.</p>
              </div>
            </figure>
          </div>

          <label class="field">
            <span>Prompt</span>
            <textarea
              id="prompt"
              rows="4"
            >Image 1 shows a person, and Image 2 shows a clothing item. Generate a photorealistic image of the same person from Image 1 wearing the clothing from Image 2. Keep the person's face, identity, hair, body shape, pose, and background exactly as in Image 1. Make the clothing fit naturally with realistic folds, lighting, and shadows that match the original scene. Do not change the person.</textarea>
            <span class="hint">기본 프롬프트를 수정하면 스타일/포즈/배경 변형도 지시할 수 있습니다.</span>
          </label>

          <div class="actions">
            <button id="submitBtn" type="submit">생성</button>
            <span id="status" class="status"></span>
          </div>
        </form>

        <section class="panel results">
          <h2>결과</h2>
          <div id="resultsGrid" class="image-grid four">
            <p class="placeholder">아직 결과가 없습니다.</p>
          </div>
        </section>
      </section>
    </main>

    <section class="logpanel">
      <header>
        <h2>Verbose Log</h2>
        <span id="logCount" class="meta"></span>
      </header>
      <pre id="log"></pre>
    </section>

    <script src="app.js"></script>
  </body>
</html>
